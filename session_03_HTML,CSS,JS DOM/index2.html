<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Công việc Cá nhân</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="container">
        <h1 class="app-title">Quản lý Công việc Cá nhân</h1>
        
        <div class="top-bar">
            <button id="btnOpenModal" class="btn btn-primary">Thêm Công Việc</button>
            <div class="statistics">
                <span class="stat-box blue">Tổng: <strong id="statTotal">0</strong></span>
                <span class="stat-box green">Đã xong: <strong id="statCompleted">0</strong></span>
                <span class="stat-box orange">Chưa xong: <strong id="statPending">0</strong></span>
            </div>
        </div>

        <div id="notification" class="notification hidden"></div>

        <div id="taskContainer" class="task-grid">
            </div>
    </div>

    <div id="taskModal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modalTitle">Thêm mới Công việc</h2>
            <form id="taskForm">
                <input type="hidden" id="editIndex" value="-1">
                
                <div class="form-group">
                    <label for="taskTitle">Tiêu đề công việc:</label>
                    <input type="text" id="taskTitle" placeholder="Nhập tiêu đề...">
                    <span class="error-message" id="error-taskTitle"></span>
                </div>
                
                <div class="form-group">
                    <label for="taskDesc">Mô tả ngắn:</label>
                    <textarea id="taskDesc" rows="3" placeholder="Mô tả chi tiết..."></textarea>
                </div>
                
                <div class="form-group row-group">
                    <div class="col">
                        <label for="dueDate">Hạn hoàn thành:</label>
                        <input type="date" id="dueDate">
                        <span class="error-message" id="error-dueDate"></span>
                    </div>
                    <div class="col">
                        <label for="priority">Mức ưu tiên:</label>
                        <select id="priority">
                            <option value="Cao">Cao</option>
                            <option value="Trung bình" selected>Trung bình</option>
                            <option value="Thấp">Thấp</option>
                        </select>
                    </div>
                </div>
                
                <div class="modal-actions">
                    <button type="button" id="btnCancel" class="btn btn-secondary">Hủy</button>
                    <button type="submit" class="btn btn-primary">Lưu Công việc</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script2.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài B2 - Animations</title>
    <link rel="stylesheet" href="animations.css">
</head>
<body>
    <div class="container">
        
        <h1 class="title fade-in-scroll">Sản Phẩm Mới</h1>

        <div class="product-card">
            
            <div class="img-container">
                <img src="https://via.placeholder.com/300x200?text=Anh+San+Pham" alt="Sản phẩm">
            </div>
            
            <div class="card-content">
                <h3>Giày Thể Thao</h3>
                <p>Giá: 500.000đ</p>
                
                <button class="btn-buy">Mua ngay</button>
            </div>
        </div>

        <hr>

        <div class="loading-section">
            <p>Đang tải thêm...</p>
            <div class="spinner"></div>
        </div>

    </div>
</body>
</html>

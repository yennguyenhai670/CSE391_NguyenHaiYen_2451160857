<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <div class="container mt-4">
        <div class="col-12 col-md-4">
            <div class="card position-relative ">
                <span class="badge bg-danger position-absolute ">Sale</span>
                <img src="https://picsum.photos/300/200" class="card-img-top" alt="Sản phẩm 1">
                <div class="card-body">
                    <h5 class="card-title">Sản phẩm 1</h5>
                    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#chi-tiet-san-pham">Chi tiết</button>
                </div>
            </div>
        </div>
    </div>
    
    <div>
        <div class="modal fade" id="chi-tiet-san-pham" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Chi tiết sản phẩm</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p>Đây là chi tiết sản phẩm 1</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
                        
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Product Catalog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">TechStore</div>
        
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Tìm kiếm sản phẩm..." autocomplete="off">
            
            <select id="sortSelect">
                <option value="default">Sắp xếp: Mặc định</option>
                <option value="price-asc">Giá: Thấp đến Cao</option>
                <option value="price-desc">Giá: Cao xuống Thấp</option>
                <option value="name-asc">Tên: A - Z</option>
                <option value="rating-desc">Đánh giá cao nhất</option>
            </select>
        </div>

        <div class="header-actions">
            <button id="darkModeToggle">🌙</button>
            <div class="cart-wrapper">
                🛒 <span id="cartBadge" class="badge">0</span>
            </div>
        </div>
    </header>

    <nav id="categoryFilters">
        <button class="cat-btn active" data-cat="all">Tất cả</button>
        <button class="cat-btn" data-cat="phone">Điện thoại</button>
        <button class="cat-btn" data-cat="laptop">Laptop</button>
        <button class="cat-btn" data-cat="tablet">Tablet</button>
        <button class="cat-btn" data-cat="accessory">Phụ kiện</button>
    </nav>

    <main id="productContainer" class="product-grid"></main>

    <div id="modalOverlay" class="modal-overlay hidden"></div>

    <script src="app.js"></script>
</body>
</html>

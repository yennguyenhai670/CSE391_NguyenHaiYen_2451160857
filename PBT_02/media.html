<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trang Multimedia</title>
</head>
<body>
    <h1>Giới thiệu sản phẩm</h1>

    <h2>Hình ảnh sản phẩm</h2>
    <figure>
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=300"
             alt="iPhone 16 màu đen"
             loading="lazy"
             style="max-width:100%; height:auto;">
        <figcaption>iPhone 16 - 25.000.000đ</figcaption>
    </figure>

    <figure>
        <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=300"
             alt="Laptop Dell màu bạc"
             loading="lazy"
             style="max-width:100%; height:auto;">
        <figcaption>Laptop Dell - 18.000.000đ</figcaption>
    </figure>

    <figure>
        <img src="https://images.unsplash.com/photo-1518441902110-5e3b3f4f47d0?w=300"
             alt="Tai nghe Bluetooth"
             loading="lazy"
             style="max-width:100%; height:auto;">
        <figcaption>Tai nghe Bluetooth - 500.000đ</figcaption>
    </figure>

    <!-- Video YouTube -->
    <h2>Video giới thiệu</h2>

    <iframe width="560" height="315"
        src="https://www.youtube.com/embed/70gCxCTpvBg?si=hnj1dUN6Kjm2jhld" 
        title="YouTube video" 
        allowfullscreen>
    </iframe>

    <!--Video local -->
    <h2>Video sản phẩm</h2>

    <video controls poster="https://via.placeholder.com/300">
        <source src="video.mp4" type="video/mp4">
        <source src="video.webm" type="video/webm">
        Trình duyệt không hỗ trợ video.
    </video>

    <!--Audio -->
    <h2>Nhạc nền</h2>
    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
        Trình duyệt không hỗ trợ audio.
    </audio>

    <!--SVG -->
    <h2>Logo (SVG)</h2>
    <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="2" fill="blue" />
    </svg>
</body>
</html>
